<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Google</title>
<style>
  body { margin:0; overflow:hidden; background:#fff; font-family:sans-serif; user-select:none; touch-action:none; }
  .e { position:absolute; left:0; top:0; will-change:transform; box-sizing:border-box; white-space:nowrap; }
  .t { background:#e9ecef; border:1px solid #c1c9d2; border-bottom:none; border-radius:8px 8px 0 0; padding:8px 20px; font-size:12px; }
  #logo { font-size:72px; font-weight:500; letter-spacing:-2px; z-index:10; }
  #bar { width:480px; height:46px; background:#fff; border:1px solid #dfe1e5; border-radius:24px; text-align:center; line-height:42px; font-size:16px; z-index:20; }
  #bar.act { border:2px solid #34A853; box-shadow:0 4px 10px rgba(52,168,83,0.3); cursor:move; }
  .b { background:#f8f9fa; border:1px solid #f8f9fa; border-radius:4px; padding:10px 16px; font-size:14px; z-index:15; }
  .w { background:#fff; border:1px solid #dfe1e5; border-radius:8px; padding:15px; font-size:14px; box-shadow:0 1px 6px rgba(0,0,0,0.1); z-index:5; }
  .s { position:absolute; pointer-events:none; z-index:14; background:#dc3545; color:#fff; font-size:11px; padding:4px 8px; border-radius:3px; }
</style>
</head>
<body>

<div id="tab-container" style="position:absolute; top:0; left:0; width:100%; height:40px; background:#dee2e6; display:flex; align-items:flex-end; padding-left:10px;">
  <div id="tab1" class="e t">📄 新しいタブ</div>
  <div id="tab2" class="e t">🐱 GitHub (pudrick)</div>
  <div id="tab3" class="e t">📺 YouTube</div>
</div>
<div id="logo" class="e">
  <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
</div>
<div id="bar" class="e">google fall</div>
<div id="btn1" class="e b">Google 検索</div>
<div id="btn2" class="e b">I'm Feeling Lucky</div>

<div id="w1" class="e w">📰 トレンド：インゲン菜が世界中で大流行</div>
<div id="w2" class="e w">🌤️ お天気：千葉市 降水確率 0.2%</div>
<div id="w3" class="e w">📦 Amazon：注文したブーメランが発送されました</div>
<div id="w4" class="e w">🎮 ゲーム：pudrickが破壊神に覚醒</div>

<script>
  const w=window.innerWidth, h=window.innerHeight, g=0.45, shards=[];
  let start=false, hold=false, tx=w/2, ty=h*0.42, lx=tx, ly=ty, ox=0, oy=0;

  function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'crash') {
      const bufSize = ctx.sampleRate * 0.4, buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate), data = buffer.getChannelData(0);
      for (let i = 0; i < bufSize; i++) { data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08)); }
      const noise = ctx.createBufferSource(); noise.buffer = buffer;
      const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(1200, ctx.currentTime);
      noise.connect(filter); filter.connect(ctx.destination); noise.start();
    } else if (type === 'hit') {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
    }
  }

  const objs = {
    tab1:{el:document.getElementById('tab1'), x:10, y:12, vx:0, vy:0, a:0, va:0, st:true, w:100, h:28, txt:"📄新タブ"},
    tab2:{el:document.getElementById('tab2'), x:115, y:12, vx:0, vy:0, a:0, va:0, st:true, w:130, h:28, txt:"🐱GitHub"},
    tab3:{el:document.getElementById('tab3'), x:250, y:12, vx:0, vy:0, a:0, va:0, st:true, w:100, h:28, txt:"📺YouTube"},
    logo:{el:document.getElementById('logo'), x:w/2-100, y:h*0.22, vx:0, vy:0, a:0, va:0, st:false, w:200, h:75},
    bar: {el:document.getElementById('bar'), x:w/2-240, y:h*0.42, vx:0, vy:0, a:0, va:0, st:true, w:480, h:46},
    btn1:{el:document.getElementById('btn1'), x:w/2-140, y:h*0.53, vx:0, vy:0, a:0, va:0, st:true, w:110, h:36, txt:"検索"},
    btn2:{el:document.getElementById('btn2'), x:w/2+10, y:h*0.53, vx:0, vy:0, a:0, va:0, st:true, w:140, h:36, txt:"Lucky"},
    w1:  {el:document.getElementById('w1'), x:w/2-240, y:h*0.62, vx:0, vy:0, a:0, va:0, st:true, w:230, h:60, txt:"📰インゲン"},
    w2:  {el:document.getElementById('w2'), x:w/2+10,  y:h*0.62, vx:0, vy:0, a:0, va:0, st:true, w:230, h:60, txt:"🌤️天気"},
    w3:  {el:document.getElementById('w3'), x:w/2-240, y:h*0.72, vx:0, vy:0, a:0, va:0, st:true, w:230, h:60, txt:"📦注文"},
    w4:  {el:document.getElementById('w4'), x:w/2+10,  y:h*0.72, vx:0, vy:0, a:0, va:0, st:true, w:230, h:60, txt:"🎮覚醒"}
  };

  setTimeout(() => {
    start=true; objs.bar.st=false; objs.btn1.st=false; objs.btn2.st=false;
    ['w1','w2','w3','w4'].forEach(k=>objs[k].st=true);
    objs.bar.el.classList.add('act'); objs.bar.el.innerText="音量注意！ロゴを弾いてすべてを砕け！";
  }, 200);

  // ⚡ iPadのマルチタッチデータから1つ目の指の座標を確実に狙い撃つ修正
  function up(e) { const t=e.touches&&e.touches.length>0?e.touches[0]:e; tx=t.clientX; ty=t.clientY; }
  
  function startHold(clientX, clientY, event) {
    const d = Math.hypot(clientX-(objs.bar.x+240), clientY-(objs.bar.y+23));
    if (d < 300) { 
      hold=true; ox = clientX - objs.bar.x; oy = clientY - objs.bar.y;
      if(event.touches&&event.touches.length>0) { tx=event.touches[0].clientX; ty=event.touches[0].clientY; } else { tx=clientX; ty=clientY; } lx=tx; ly=ty; 
    }
  }

  window.addEventListener('mousedown', (e)=>startHold(e.clientX, e.clientY, e));
  window.addEventListener('mousemove', (e)=>{ if(hold) up(e); });
  window.addEventListener('mouseup', ()=>hold=false);
  
  document.addEventListener('touchstart', (e)=>{ if(e.touches&&e.touches.length>0) startHold(e.touches[0].clientX, e.touches[0].clientY, e); }, {passive:true});
  document.addEventListener('touchmove', (e)=>{ up(e); if(hold) e.preventDefault(); }, {passive:false});
  document.addEventListener('touchend', ()=>hold=false);

  function loop() {
    if (start) {
      if (hold) {
        objs.bar.vx=(tx-ox-objs.bar.x)*0.4; objs.bar.vy=(ty-oy-objs.bar.y)*0.4;
        objs.bar.va=(tx-lx)*0.4; objs.bar.x+=objs.bar.vx; objs.bar.y+=objs.bar.vy; objs.bar.a+=objs.bar.va;
      } else {
        objs.bar.vy+=g; objs.bar.vx*=0.98; objs.bar.va*=0.98;
        objs.bar.x+=objs.bar.vx; objs.bar.y+=objs.bar.vy; objs.bar.a+=objs.bar.va;
        if(objs.bar.y>h-46){ objs.bar.y=h-46; objs.bar.vy*=-0.4; objs.bar.vx*=0.7; objs.bar.va=(Math.random()-0.5)*5; }
        if(objs.bar.y<-300){ objs.bar.y=-50; objs.bar.x=w/2-240; objs.bar.vy=4; objs.bar.va=2; }
      }
      objs.logo.vy+=g; objs.logo.x+=objs.logo.vx; objs.logo.y+=objs.logo.vy; objs.logo.a+=objs.logo.va;
      for(let i=shards.length-1; i>=0; i--){ const s=shards[i]; s.vy+=g; s.x+=s.vx; s.y+=s.vy; s.a+=s.va; s.el.style.transform=`translate(${s.x}px,${s.y}px) rotate(${s.a}deg)`; if(s.y>h-20){s.y=h-20; s.vy*=-0.3;} }
    }
    if(objs.logo.y>h-75){ objs.logo.y=h-75; objs.logo.vy*=-0.65; objs.logo.vx*=0.9; objs.logo.va*=0.9; }
    if(objs.logo.x<0||objs.logo.x>w-200){ objs.logo.vx*=-0.7; objs.logo.x=objs.logo.x<0?0:w-200; }
    if(start && hit(objs.logo, objs.bar)){ 
      playSound('hit'); 
      objs.logo.vy=objs.bar.vy*1.5-Math.abs(objs.bar.va)-4; objs.logo.vx=objs.bar.vx*1.3+objs.bar.va*2+(Math.random()-0.5)*6; objs.logo.va=objs.logo.vx*0.6+objs.bar.va; 
    }
    
    for(let k in objs){
      const t=objs[k]; if(k!=='logo' && k!=='bar' && t.st && hit(objs.logo, t)){
        t.st=false; t.el.style.display='none';
        playSound('crash'); 
        for(let i=0; i<4; i++){
          const sEl=document.createElement('div'); sEl.className='s'; sEl.innerText=(t.txt||"💥").substring(i,i+2)||"💥"; document.body.appendChild(sEl);
          shards.push({ el:sEl, x:t.x+(i*35), y:t.y, vx:objs.logo.vx*0.5+(Math.random()-0.5)*12, vy:objs.logo.vy*0.4-Math.random()*5-3, a:Math.random()*360, va:(Math.random()-0.5)*30 });
        }
        objs.logo.vy*=-0.6;
      }
    }
    if(objs.logo.y<-300){ objs.logo.y=-80; objs.logo.x=Math.random()*(w-200); objs.logo.vy=5; objs.logo.vx=(Math.random()-0.5)*4; }
    for(let k in objs){ const o=objs[k]; o.el.style.transform=`translate(${o.x}px,${o.y}px) rotate(${o.a}deg)`; }
    lx=tx; ly=ty; requestAnimationFrame(loop);
  }
  function hit(o1,o2){ return o1.x<o2.x+o2.w && o1.x+o1.w>o2.x && o1.y<o2.y+o2.h && o1.y+o1.h>o2.y; }
  loop();
</script>
</body>
</html>
