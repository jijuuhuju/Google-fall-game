<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Google</title>
<style>
  body {
    margin: 0; padding: 0; overflow: hidden;
    background-color: #ffffff; font-family: sans-serif; user-select: none;
    touch-action: none; /* 画面スクロールを完全に禁止 */
  }
  .game-element {
    position: absolute; display: inline-block; box-sizing: border-box; white-space: nowrap;
    left: 0; top: 0; will-change: transform;
  }
  /* 上のタブバー */
  .tab-item {
    background: #e9ecef; border: 1px solid #dee2e6; border-radius: 4px 4px 0 0;
    padding: 6px 16px; font-size: 12px; color: #495057; z-index: 5;
  }
  /* Googleロゴ */
  #logo {
    font-size: 50px; font-weight: bold; z-index: 10;
  }
  /* 検索バー */
  #search-bar {
    width: 320px; height: 44px; border: 1px solid #dfe1e5; border-radius: 24px;
    background: #ffffff; color: #202124; text-align: center; line-height: 40px;
    font-size: 16px; z-index: 20;
  }
  #search-bar.game-active {
    border: 2px solid #4285F4;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .broken {
    border-color: #dc3545 !important; background: #dc3545 !important; color: #ffffff !important;
    font-weight: bold; opacity: 0.8; box-shadow: 0 0 15px rgba(220, 53, 69, 0.6);
  }
</style>
</head>
<body>

<div id="tab1" class="game-element tab-item">📄 新しいタブ</div>
<div id="tab2" class="game-element tab-item">🐱 GitHub</div>
<div id="tab3" class="game-element tab-item">📺 YouTube</div>

<div id="logo" class="game-element">
  <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
</div>

<div id="search-bar" class="game-element">google fall</div>

<script>
  const w = window.innerWidth;
  const h = window.innerHeight;

  // 各要素の初期データ（位置、速度、回転など）
  const objects = {
    tab1: { el: document.getElementById('tab1'), x: 20, y: 10, vx: 0, vy: 0, angle: 0, va: 0, isStatic: true, width: 90, height: 30 },
    tab2: { el: document.getElementById('tab2'), x: 140, y: 10, vx: 0, vy: 0, angle: 0, va: 0, isStatic: true, width: 80, height: 30 },
    tab3: { el: document.getElementById('tab3'), x: 240, y: 10, vx: 0, vy: 0, angle: 0, va: 0, isStatic: true, width: 90, height: 30 },
    logo: { el: document.getElementById('logo'), x: w / 2 - 80, y: h * 0.25, vx: 0, vy: 0, angle: 0, va: 0, isStatic: false, width: 160, height: 60 },
    bar:  { el: document.getElementById('search-bar'), x: w / 2 - 160, y: h * 0.45, vx: 0, vy: 0, angle: 0, va: 0, isStatic: true, width: 320, height: 44 }
  };

  // 初期位置を画面に一度反映
  for (let key in objects) {
    const obj = objects[key];
    obj.el.style.transform = `translate(${obj.x}px, ${obj.y}px) rotate(${obj.angle}deg)`;
  }

  let gameStarted = false;
  let isGameOver = false;
  const gravity = 0.4;

  // ⏰ 0.2秒後に重力発動＆検索バーの操作解放
  setTimeout(() => {
    gameStarted = true;
    objects.bar.isStatic = false;
    objects.bar.el.classList.add('game-active');
    objects.bar.el.innerText = "指で弾け！触られたら即死！";
  }, 200);

  // 指のタッチ移動（スワイプ）イベントを確実にキャッチ
  let touchX = w / 2;
  let touchY = h * 0.45;

  function updateTouch(e) {
    const t = e.touches ? e.touches[0] : e;
    touchX = t.clientX;
    touchY = t.clientY;
  }
  window.addEventListener('mousemove', updateTouch);
  window.addEventListener('touchmove', updateTouch, { passive: false });

  // メインループ（1秒間に60回、位置や衝突を計算する）
  function gameLoop() {
    // 1. 検索バー（パドル）を指の座標にスムーズに追従させる
    if (gameStarted && !isGameOver) {
      const targetX = touchX - objects.bar.width / 2;
      const targetY = touchY - objects.bar.height / 2;
      // 移動速度を計算してバッティングの威力にする
      objects.bar.vx = (targetX - objects.bar.x) * 0.3;
      objects.bar.vy = (targetY - objects.bar.y) * 0.3;
      objects.bar.x += objects.bar.vx;
      objects.bar.y += objects.bar.vy;
    }

    // 2. 物理演算（重力と速度の更新）
    if (gameStarted) {
      // ロゴの移動と重力
      objects.logo.vy += gravity;
      objects.logo.x += objects.logo.vx;
      objects.logo.y += objects.logo.vy;
      objects.logo.angle += objects.logo.va;

      // 破壊されたタブや検索バーの自由落下
      ['tab1', 'tab2', 'tab3', 'bar'].forEach(key => {
        const obj = objects[key];
        if (!obj.isStatic && (key !== 'bar' || isGameOver)) {
          obj.vy += gravity;
          obj.x += obj.vx;
          obj.y += obj.vy;
          obj.angle += obj.va;
        }
      });
    }

    // 3. 画面の壁・床でのバウンド処理
    // ロゴが床に当たったら跳ね返る
    if (objects.logo.y > h - objects.logo.height) {
      objects.logo.y = h - objects.logo.height;
      objects.logo.vy = -objects.logo.vy * 0.7;
      objects.logo.vx *= 0.9;
    }
    // 左右の壁
    if (objects.logo.x < 0 || objects.logo.x > w - objects.logo.width) {
      objects.logo.vx = -objects.logo.vx * 0.7;
      objects.logo.x = objects.logo.x < 0 ? 0 : w - objects.logo.width;
    }

    // 4. 当たり判定（ロゴ vs 検索バー）
    if (!isGameOver && gameStarted) {
      if (checkCollision(objects.logo, objects.bar)) {
        // 検索バーが上に動いている（叩きにいった）ならロゴを激しく吹き飛ばす
        if (objects.bar.vy < -2) {
          objects.logo.vy = objects.bar.vy * 1.5 - 5; // 特大ジャンプ
          objects.logo.vx = objects.bar.vx * 1.2 + (Math.random() - 0.5) * 5;
          objects.logo.va = objects.logo.vx * 0.5; // 回転をかける
        } else {
          // 叩けずにロゴが触れたら即ゲームオーバー
          isGameOver = true;
          objects.bar.isStatic = false;
          objects.bar.el.classList.add('broken');
          objects.bar.el.innerText = "💀 検索バー大破（終了）";
          objects.bar.vy = 2;
          objects.bar.vx = (Math.random() - 0.5) * 6;
          objects.bar.va = 5; // 激しく回転して落ちる
        }
      }
    }

    // 5. 当たり判定（ロゴ vs タブバー）
    ['tab1', 'tab2', 'tab3'].forEach(key => {
      const tab = objects[key];
      if (tab.isStatic && checkCollision(objects.logo, tab)) {
        tab.isStatic = false;
        tab.el.classList.add('broken');
        tab.el.innerText = "💥 破壊";
        // ロゴの勢いをタブに伝えて落とす
        tab.vy = objects.logo.vy * 0.5 + 2;
        tab.vx = objects.logo.vx * 0.5 + (Math.random() - 0.5) * 3;
        tab.va = (Math.random() - 0.5) * 10;
        
        // ロゴ自身も少し跳ね返る
        objects.logo.vy = -objects.logo.vy * 0.6;
      }
    });

    // 6. ロゴが画面外（天井）に消えたら、ランダムに上から再落下
    if (objects.logo.y < -200) {
      objects.logo.y = -60;
      objects.logo.x = Math.random() * (w - objects.logo.width);
      objects.logo.vy = 4;
      objects.logo.vx = (Math.random() - 0.5) * 4;
    }

    // 7. 計算した位置を画面（CSS）に一斉反映
    for (let key in objects) {
      const obj = objects[key];
      obj.el.style.transform = `translate(${obj.x}px, ${obj.y}px) rotate(${obj.angle}deg)`;
    }

    requestAnimationFrame(gameLoop);
  }

  // 簡単な四角形同士の当たり判定関数
  function checkCollision(obj1, obj2) {
    return (
      obj1.x < obj2.x + obj2.width &&
      obj1.x + obj1.width > obj2.x &&
      obj1.y < obj2.y + obj2.height &&
      obj1.y + obj1.height > obj2.y
    );
  }

  // ゲームループ開始
  gameLoop();
</script>
</body>
</html>
